services:
  postgres:
    image: postgres:17
    env_file:
      - .env
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready -U user -d course_assistant
      interval: 5s
      timeout: 5s
      retries: 10

  grafana:
    image: grafana/grafana
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
    depends_on:
      postgres:
        condition: service_healthy

  streamlit:
    build:
      context: ..
      dockerfile: 05-Monitoring/Dockerfile
    env_file:
      - .env
    environment:
      POSTGRES_HOST: postgres
    ports:
      - "8501:8501"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pgdata:
    external: true
  grafana_data:
    external: true
